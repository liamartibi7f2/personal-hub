<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal Hub OS — A modular command center for productivity and learning.">
  <title>Hub OS</title>

  <!-- Stylesheet (relative path for GitHub Pages) -->
  <link rel="stylesheet" href="./styles.css">

  <!-- Preconnect for Google Fonts (JetBrains Mono for timer/code text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Theme flash prevention: apply light-mode before first paint -->
  <script>
    (function(){try{if(localStorage.getItem('hub_theme')==='light'){document.documentElement.classList.add('light-mode');}}catch(_){}})();
  </script>
</head>
<body>

  <!-- ============================================================ -->
  <!-- APP SHELL LAYOUT                                              -->
  <!-- ============================================================ -->
  <div id="app" class="app-layout">

    <!-- -------------------------------------------------------- -->
    <!-- SIDEBAR NAVIGATION                                        -->
    <!-- Fixed left on desktop; floating bottom dock on mobile     -->
    <!-- -------------------------------------------------------- -->
    <aside id="sidebar" class="sidebar glass" role="navigation" aria-label="Main navigation">
      <!-- Brand / Logo -->
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="24" height="24" rx="6" stroke="var(--accent-primary)" stroke-width="2"/>
            <circle cx="14" cy="14" r="5" fill="var(--accent-primary)" opacity="0.6"/>
            <circle cx="14" cy="14" r="2" fill="var(--accent-primary)"/>
          </svg>
        </div>
        <span class="brand-text">HUB<span class="accent-dot">.</span>OS</span>
      </div>

      <!-- Nav items are injected here by app.js -->
      <nav id="nav-list" class="sidebar-nav" aria-label="Tool navigation">
        <!-- Populated dynamically -->
      </nav>

      <!-- Sidebar footer -->
      <div class="sidebar-footer">
        <div class="status-indicator" title="System online">
          <span class="status-dot"></span>
          <span class="status-label">Online</span>
        </div>
        <button class="theme-toggle-btn" id="btn-theme-toggle" title="Toggle light/dark theme" aria-label="Toggle theme">
          <span class="theme-toggle-icon">☀️</span>
        </button>
        <button class="sidebar-settings-btn" id="btn-backup-open" title="Settings &amp; Data Backup" aria-label="Open settings and backup">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none" class="sidebar-settings-icon">
            <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.6 3.6l1.4 1.4M13 13l1.4 1.4M3.6 14.4l1.4-1.4M13 5l1.4-1.4"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- -------------------------------------------------------- -->
    <!-- MAIN CONTENT AREA                                         -->
    <!-- Content for the active tab is injected here               -->
    <!-- -------------------------------------------------------- -->
    <main id="main-content" class="main-content" aria-live="polite">
      <!-- Populated dynamically by app.js -->
    </main>

  </div><!-- /#app -->

  <!-- ============================================================ -->
  <!-- GLOBAL BACKUP / SETTINGS MODAL OVERLAY                         -->
  <!-- Appears when user clicks the ⚙ icon in the sidebar footer     -->
  <!-- ============================================================ -->
  <div class="backup-overlay" id="backup-overlay" role="dialog" aria-modal="true" aria-label="Settings &amp; Data Backup">
    <div class="backup-modal glass">
      <!-- Header -->
      <div class="backup-modal-header">
        <div class="backup-modal-title-group">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="backup-modal-icon-svg">
            <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.6 3.6l1.4 1.4M13 13l1.4 1.4M3.6 14.4l1.4-1.4M13 5l1.4-1.4"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <h3>Settings &amp; Backup</h3>
        </div>
        <button class="backup-close-btn" id="btn-backup-close" aria-label="Close settings">✕</button>
      </div>

      <!-- Body -->
      <div class="backup-modal-body">
        <!-- About section -->
        <div class="backup-section">
          <h4 class="backup-section-title">Hub OS Data</h4>
          <p class="backup-section-desc">Save or restore all your app data: flashcards, quiz decks, Pomodoro stats, and settings — everything stored in your browser.</p>
        </div>

        <!-- Actions -->
        <div class="backup-actions">
          <button class="backup-action-btn backup-action-export" id="btn-backup-export">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 2v10M5 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 12v3a1 1 0 001 1h10a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Export All Data</span>
          </button>
          <button class="backup-action-btn backup-action-import" id="btn-backup-import-trigger">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 14V4M5 9l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 4v3a1 1 0 001 1h10a1 1 0 001-1V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Import Backup</span>
          </button>
        </div>

        <!-- Hidden file input for import -->
        <input type="file" id="backup-file-input" accept=".json" class="backup-file-hidden" aria-label="Select backup file">

        <!-- Status message area -->
        <div class="backup-status" id="backup-status"></div>
      </div>

      <!-- Footer -->
      <div class="backup-modal-footer">
        <span class="backup-footer-hint">Data never leaves your browser</span>
        <button class="btn btn-ghost" id="btn-backup-cancel">Close</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- FOCUS VIBE — Floating Music Player Widget                    -->
  <!-- Persistent across SPA tab switches; YouTube iframe is hidden -->
  <!-- ============================================================ -->
  <div id="focus-vibe-widget" class="focus-vibe-widget">
    <!-- Hidden YouTube player render target -->
    <div id="focus-vibe-player"></div>

    <!-- Collapsed trigger (shown when minimized) -->
    <button id="focus-vibe-trigger" class="focus-vibe-trigger" title="Open Focus Vibe" aria-label="Open Focus Vibe player">
      <span class="trigger-icon">🎵</span>
    </button>

    <!-- Expanded glass panel -->
    <div class="focus-vibe-panel glass">
      <div class="focus-vibe-header">
        <div class="focus-vibe-header-left">
          <span class="focus-vibe-icon">🎧</span>
          <span class="focus-vibe-title">Focus Vibe</span>
        </div>
        <div class="focus-vibe-header-actions">
          <button id="focus-vibe-minimize" class="focus-vibe-header-btn" title="Minimize" aria-label="Minimize player">—</button>
        </div>
      </div>

      <div class="focus-vibe-body">
        <div class="focus-vibe-now-playing">
          <span class="now-label">Now Playing</span>
          <span id="focus-vibe-label" class="now-value">Lofi Beats</span>
        </div>

        <!-- Neon Audio Visualizer (simulated, no Web Audio API needed) -->
        <div class="focus-vibe-visualizer" id="focus-vibe-visualizer">
          <div class="vibe-bar vibe-bar-c"></div>
          <div class="vibe-bar vibe-bar-p"></div>
          <div class="vibe-bar vibe-bar-c"></div>
          <div class="vibe-bar vibe-bar-p"></div>
          <div class="vibe-bar vibe-bar-c"></div>
          <div class="vibe-bar vibe-bar-p"></div>
        </div>

        <div class="focus-vibe-controls-row">
          <button id="focus-vibe-play" class="focus-vibe-play-btn" aria-label="Toggle play">▶</button>
          <button id="focus-vibe-next" class="focus-vibe-next-btn" aria-label="Next track">⏭️</button>
          <div class="focus-vibe-volume-wrap">
            <span class="vol-icon">🔊</span>
            <input type="range" id="focus-vibe-volume" class="focus-vibe-volume" min="0" max="1" step="0.01" value="0.5">
          </div>
        </div>

        <div class="focus-vibe-vibes" id="focus-vibe-vibes">
          <!-- Injected by JS -->
        </div>

        <div class="focus-vibe-custom-row">
          <input type="text" id="focus-vibe-url" class="focus-vibe-url-input" placeholder="Paste YouTube link..." spellcheck="false">
          <button id="focus-vibe-load" class="focus-vibe-load-btn">Load</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- SCRIPTS (order matters: app.js first, then modules)          -->
  <!-- ============================================================ -->
  <script src="./app.js"></script>
  <script src="./modules/dashboard.js"></script>
  <script src="./modules/flashcard.js"></script>
  <script src="./modules/pomodoro.js"></script>
  <script src="./modules/quiz.js"></script>
  <script src="./modules/focus-vibe.js"></script>

</body>
</html>
